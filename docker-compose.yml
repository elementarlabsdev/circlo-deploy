services:
  redis:
    image: redis:alpine
    container_name: redis
    command: /bin/sh -c "redis-server --requirepass \"$$REDIS_PASSWORD\""
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circlo

  imageproxy:
    image: willnorris/imageproxy
    container_name: imageproxy
    environment:
      IMAGEPROXY_CACHE: "redis://:$REDIS_PASSWORD@redis:6379"
      IMAGEPROXY_BASEURL: "https://$DOMAIN"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - circlo
    extra_hosts:
      - "${DOMAIN}:host-gateway"

  database:
    image: timescale/timescaledb-ha:pg17
    restart: always
    container_name: database
    user: root
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circlo

  cap:
    image: tiago2/cap:latest
    container_name: cap
    environment:
      - ADMIN_KEY=${CAP_ADMIN_KEY:?CAP_ADMIN_KEY is required}
      - SERVER_PORT=3001
      - ENABLE_ASSETS_SERVER=true
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      - cap_data:/usr/src/app/.data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3001'"]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - circlo

  api:
    container_name: api
    image: elementarlabs/circlo-api:1.0
    restart: always
    volumes:
      - ./data/public:/app/public
    environment:
      ENV: ${ENV:-prod}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BACKEND_URL: https://${DOMAIN:?DOMAIN is required}
      BACKEND_DOMAIN: $DOMAIN
      FRONTEND_URL: https://$DOMAIN
      DOMAIN: $DOMAIN
      BACKEND_HOST_URL: https://$DOMAIN
      HOST_URL: https://$DOMAIN
      IMAGE_PROXY_URL: https://img.$DOMAIN
      LOCAL_FILE_STORAGE_BASE_URL: ${LOCAL_FILE_STORAGE_BASE_URL:-https://$DOMAIN}
      NOTIFICATIONS_AGGREGATION_WINDOW_MS: ${NOTIFICATIONS_AGGREGATION_WINDOW_MS:-300000}
      LOCALE: ${LOCALE:-en}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      CAPTCHA_HOST_URL: https://captcha.$DOMAIN
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      cap:
        condition: service_healthy
    networks:
      - circlo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/robots-txt"]
      interval: 10s
      timeout: 5s
      retries: 5

  webserver:
    image: caddy:2.7-alpine
    container_name: webserver
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: $DOMAIN
      CERT_MAIL: $CERT_MAIL
    depends_on:
      api:
        condition: service_healthy
      imageproxy:
        condition: service_started
    networks:
      - circlo

  app:
    container_name: app
    image: elementarlabs/circlo-app:1.0
    restart: always
    environment:
      LOCALE: $LOCALE
      APP_API_URL: https://$DOMAIN/api/v1/
      WEBSOCKET_URL: https://ws.$DOMAIN
    depends_on:
      api:
        condition: service_healthy
      imageproxy:
        condition: service_started
    networks:
      - circlo

networks:
  circlo:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  cap_data:
  caddy_data:
  caddy_config: